<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Craft Storage Optimizer</title>
  <desc id="desc">A polished storage stack with an optimized image asset and circular cleanup arrow.</desc>
  <defs>
    <linearGradient id="bg" x1="62" y1="40" x2="454" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF7EC"/>
      <stop offset=".48" stop-color="#EEF8F5"/>
      <stop offset="1" stop-color="#DDEDEA"/>
    </linearGradient>
    <linearGradient id="driveTop" x1="114" y1="286" x2="390" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#174D5A"/>
      <stop offset="1" stop-color="#0D3340"/>
    </linearGradient>
    <linearGradient id="driveMid" x1="134" y1="336" x2="382" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E7A7D"/>
      <stop offset="1" stop-color="#14545F"/>
    </linearGradient>
    <linearGradient id="driveLow" x1="150" y1="385" x2="368" y2="444" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2AAE9E"/>
      <stop offset="1" stop-color="#197A82"/>
    </linearGradient>
    <linearGradient id="imageFill" x1="160" y1="146" x2="336" y2="282" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DDF8F1"/>
      <stop offset="1" stop-color="#99DDD8"/>
    </linearGradient>
    <linearGradient id="accent" x1="286" y1="86" x2="426" y2="248" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFB25F"/>
      <stop offset="1" stop-color="#E84943"/>
    </linearGradient>
    <filter id="softShadow" x="52" y="70" width="408" height="404" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#173B45" flood-opacity=".18"/>
    </filter>
    <filter id="tightShadow" x="116" y="95" width="260" height="250" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="11" flood-color="#173B45" flood-opacity=".16"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <path d="M81 337c19 61 85 101 166 104 93 4 170-43 184-116 9-49-11-96-54-127-36-26-85-36-136-28-86 13-151 80-160 167Z" fill="#CFE8E2" opacity=".74"/>
  <path d="M406 107c22 22 35 53 35 87 0 67-54 121-121 121-33 0-63-13-85-35" fill="none" stroke="#F6DED0" stroke-width="36" stroke-linecap="round" opacity=".75"/>

  <g filter="url(#softShadow)">
    <rect x="101" y="278" width="310" height="72" rx="30" fill="url(#driveTop)"/>
    <rect x="129" y="302" width="176" height="16" rx="8" fill="#73E1D2"/>
    <circle cx="356" cy="314" r="12" fill="#FFCF6B"/>

    <rect x="119" y="330" width="274" height="68" rx="29" fill="url(#driveMid)"/>
    <rect x="145" y="352" width="145" height="15" rx="7.5" fill="#B8F1E9"/>
    <circle cx="343" cy="364" r="11" fill="#FA8F57"/>

    <rect x="143" y="380" width="226" height="62" rx="27" fill="url(#driveLow)"/>
    <rect x="168" y="400" width="105" height="14" rx="7" fill="#E7FFFA"/>
    <circle cx="321" cy="411" r="10" fill="#103945"/>
  </g>

  <g filter="url(#tightShadow)">
    <rect x="139" y="109" width="198" height="198" rx="34" fill="#FFFFFF"/>
    <rect x="164" y="137" width="148" height="118" rx="22" fill="url(#imageFill)"/>
    <circle cx="275" cy="170" r="18" fill="#FFCF6B"/>
    <path d="M180 239 220 195l31 31 20-22 42 43v8H180Z" fill="#178C8C"/>
    <path d="M164 273h148" stroke="#D8E8E5" stroke-width="14" stroke-linecap="round"/>
  </g>

  <g>
    <path d="M329 91c48 9 84 51 84 101 0 57-46 103-103 103-24 0-46-8-63-22" fill="none" stroke="url(#accent)" stroke-width="25" stroke-linecap="round"/>
    <path d="M245 273v-59h59" fill="none" stroke="#E84943" stroke-width="25" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M349 125c20 10 34 29 37 51" fill="none" stroke="#FFF5EA" stroke-width="12" stroke-linecap="round" opacity=".9"/>
  </g>

  <g>
    <path d="M397 334c13 0 23 10 23 23 0-13 10-23 23-23-13 0-23-10-23-23 0 13-10 23-23 23Z" fill="#FFCF6B"/>
    <path d="M86 197c10 0 18 8 18 18 0-10 8-18 18-18-10 0-18-8-18-18 0 10-8 18-18 18Z" fill="#FA8F57"/>
    <circle cx="103" cy="286" r="8" fill="#1E7A7D"/>
    <circle cx="401" cy="393" r="9" fill="#2AAE9E"/>
  </g>
</svg>
